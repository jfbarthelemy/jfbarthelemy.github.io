project:
  type: website
  resources:
    # Pre-rendered postprints are standalone HTML bundles; Quarto doesn't crawl their
    # internal assets (figures/, *_files/, badge), so copy the whole tree verbatim.
    - postprints/

website:
  title: "Jean-François Barthélémy"
  favicon: images/id_jfb_cartoon.png
  repo-url: https://github.com/jfbarthelemy/jfbarthelemy.github.io
  repo-actions: [source]
  navbar:
    background: primary
    right:
      - href: index.qmd
        text: Home
      - href: software.qmd
        text: Software
      - href: teaching.qmd
        text: Teaching
      # - href: files/cvjfb_en.pdf
      #   text: CV
      - href: publications.qmd
        text: Publications
      - href: postprints.qmd
        text: Postprints
    tools:
      - icon: github
        href: https://github.com/jfbarthelemy/jfbarthelemy.github.io
        text: "View source"


# body-header: |
#   This page brought to you by <https://example.com>

# margin-header: |
#   ![](images/jfb.jpg)

filters:
  - quarto
  - multibib
  - _extensions/postprint-links/postprint-links.lua
validate-yaml: false
bibliography:
  acl: _biblio/1_acl.bib
  acln: _biblio/2_acln.bib
  ascl: _biblio/3_ascl.bib
  os: _biblio/5_os.bib
  inv: _biblio/6_inv.bib
  acti: _biblio/7_acti.bib
  actn: _biblio/8_actn.bib
  com: _biblio/9_com.bib
  aff: _biblio/10_aff.bib
  rapp: _biblio/11_rapp.bib
  rappex: _biblio/12_rappex.bib
  brev: _biblio/14_brev.bib
  log: _biblio/15_log.bib
suppress-bibliography: false
link-citations: true
# csl: _biblio/elsevier-vancouver.csl
csl: https://www.zotero.org/styles/elsevier-vancouver
citeproc: false
# cite-method: biblatex

editor:
    render-on-save: true

format:
  html:
    theme:
      light:
        - cosmo
        - _config/customjfb.scss
      dark:
        - darkly
        - _config/customjfb-dark.scss
    css: _config/styles.css
    include-in-header: _config/dark-default.html
    toc: true
    page-layout: full
    code-overflow: wrap

execute: 
  freeze: auto
